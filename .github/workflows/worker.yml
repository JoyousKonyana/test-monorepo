name: Worker Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  detect:
    name: Detect changes
    uses: ./.github/workflows/detect.yml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Lint
        working-directory: services/worker
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.worker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        working-directory: services/worker
        run: go test ./... -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect, test]
    if: |
      needs.detect.outputs.worker == 'true' &&
      needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        working-directory: services/worker
        run: go build -o bin/worker .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [detect, build]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.detect.outputs.worker == 'true' &&
      needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy worker
        run: |
          echo "Deploying worker @ ${{ github.sha }}"
          echo "Affected services: ${{ needs.detect.outputs.affected }}"