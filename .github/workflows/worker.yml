name: Worker Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Step 1: Deltaflow detect ──────────────────────────────────────────────
  detect:
    name: Detect changes
    uses: ./.github/workflows/detect.yml

  # ── Step 2: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.worker == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./services/worker/...

  # ── Step 3: Test ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.worker == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./services/worker/... -v -race
        env:
          QUEUE_URL: ${{ secrets.QUEUE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Step 4: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect, test]
    if: |
      needs.detect.outputs.worker == 'true' &&
      needs.test.result == 'success'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Docker image
        run: |
          docker build -t worker:${{ github.sha }} ./services/worker/
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login -u ${{ secrets.REGISTRY_USER }} --password-stdin
          docker push worker:${{ github.sha }}

  # ── Step 5: Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [detect, build]
    environment: production
    if: |
      github.ref == 'refs/heads/main' &&
      needs.detect.outputs.worker == 'true' &&
      needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy worker
        run: |
          echo "Deploying worker @ ${{ github.sha }}"
          echo "Affected services this run: ${{ needs.detect.outputs.affected }}"
          # kubectl set image deployment/worker worker=worker:${{ github.sha }}
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
