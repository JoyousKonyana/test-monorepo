name: API Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  detect:
    name: Detect changes
    uses: ./.github/workflows/detect.yml
    with:
      event-name: ${{ github.event_name }}
      base-ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.before }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run linter
        working-directory: services/api
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        working-directory: services/api
        run: go test ./... -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect, test]
    if: |
      needs.detect.outputs.api == 'true' &&
      needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binary
        working-directory: services/api
        run: go build -o bin/api .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [detect, build]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.detect.outputs.api == 'true' &&
      needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy api
        run: |
          echo "Deploying api @ ${{ github.sha }}"
          echo "Affected: ${{ needs.detect.outputs.affected }}"