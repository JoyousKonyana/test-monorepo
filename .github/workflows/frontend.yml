name: Frontend Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Step 1: Deltaflow detect ──────────────────────────────────────────────
  detect:
    name: Detect changes
    uses: ./.github/workflows/detect.yml

  # ── Step 2: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      - run: npm ci --prefix services/frontend
      - run: npm run lint --prefix services/frontend

  # ── Step 3: Test ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - run: npm ci --prefix services/frontend
      - run: npm test --prefix services/frontend -- --coverage
        env:
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: services/frontend/coverage/

  # ── Step 4: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect, test]
    if: |
      needs.detect.outputs.frontend == 'true' &&
      needs.test.result == 'success'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - run: npm ci --prefix services/frontend
      - run: npm run build --prefix services/frontend
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: services/frontend/dist/

  # ── Step 5: Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [detect, build]
    environment: production
    if: |
      github.ref == 'refs/heads/main' &&
      needs.detect.outputs.frontend == 'true' &&
      needs.build.result == 'success'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Deploy to S3
        run: |
          echo "Deploying frontend @ ${{ github.sha }}"
          echo "Affected services this run: ${{ needs.detect.outputs.affected }}"
          aws s3 sync ./dist s3://${{ vars.FRONTEND_BUCKET }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
