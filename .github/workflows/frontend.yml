name: Frontend Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  detect:
    name: Detect changes
    uses: ./.github/workflows/detect.yml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        working-directory: services/frontend
        run: echo "lint passed"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Test
        working-directory: services/frontend
        run: echo "tests passed"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect, test]
    if: |
      needs.detect.outputs.frontend == 'true' &&
      needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: services/frontend
        run: echo "build passed"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [detect, build]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.detect.outputs.frontend == 'true' &&
      needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy frontend
        run: |
          echo "Deploying frontend @ ${{ github.sha }}"
          echo "Affected services: ${{ needs.detect.outputs.affected }}"